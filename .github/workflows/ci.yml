name: CI

on:
  pull_request:
    branches: [ develop, test, main ]
  push:
    branches: [ develop, test, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: flake8 src tests --max-line-length=120

      - name: Generate sample data
        run: python data/generate_legacy_source.py

      - name: Run unit tests
        run: python -m unittest discover tests -v

      - name: Run pipeline smoke test (local env)
        run: |
          python src/extract.py --env local
          python src/transform.py --env local
          python src/load.py --env local
